apiVersion: batch/v1
kind: CronJob
metadata:
  name: aiops-indexer
  namespace: observability
spec:
  schedule: "*/10 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: indexer
            image: python:3.12-slim
            command: ["/bin/sh", "-lc"]
            args:
            - |
              echo "Mount aiops platform source and run build_index incrementally in real deployment."
              echo "This manifest is a production scaffold and should be wired to CI image."
