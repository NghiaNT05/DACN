apiVersion: batch/v1
kind: CronJob
metadata:
  name: aiops-retention-cleanup
  namespace: observability
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: alpine:3.20
            command: ["/bin/sh", "-lc"]
            args:
            - |
              echo "Retention cleanup scaffold"
              echo "Mount aiops_data volume and run scripts/ops/retention_cleanup.sh in production image"
